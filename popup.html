<!DOCTYPE html>
<html>
<head>
  <title>Eye Break Reminder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 220px;
      padding: 10px;
      text-align: center;
      background-color: #f4f4f4;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #startBtn {
      background-color: #4CAF50;
      color: white;
    }

    #stopBtn {
      background-color: #f44336;
      color: white;
    }

    #status {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Eye Break</h2>

  <button id="startBtn">Start Reminder</button>
  <button id="stopBtn">Stop Reminder</button>

  <div id="status">Status: Unknown</div>

  <script src="popup.js"></script>

</body>
</html>
